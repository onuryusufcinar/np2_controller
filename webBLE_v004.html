<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiobionics Dual-Channel Control</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 1rem; background-color: #f4f7f6; color: #333; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    
    .row { display: flex; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 15px; }
    .split-container { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .channel-column { flex: 1; min-width: 350px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
    
    .param-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .param-item { display: flex; flex-direction: column; }
    .param-item label { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #555; }
    .param-item input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; transition: border 0.2s; }
    .param-item input:focus { border-color: #007bff; outline: none; }

    .btn-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    button { padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    .btn-start { background: #28a745; }
    .btn-start:hover { background: #218838; }
    .btn-stop { background: #dc3545; }
    .btn-stop:hover { background: #c82333; }
    .btn-send-params { width: 100%; margin-top: 20px; background: #6f42c1; }
    .btn-send-params:hover { background: #59359a; }

    .chart-box { width: 100%; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem; }
    .chart-container { position: relative; height: 250px; width: 100%; }
    h3 { color: #222; margin: 15px 0 10px 0; font-size: 1.1rem; border-left: 5px solid #007bff; padding-left: 10px; }
    
    .value-display { flex: 1; padding: 0.6rem; background-color: #2d2d2d; color: #00ff00; border-radius: 4px; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; overflow-x: auto; white-space: nowrap; }
    #status { font-weight: bold; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h2>🔗 Axiobionics Dual-Channel Control Panel</h2>

  <div class="row">
    <button id="connect">Connect Device</button>
    <button id="disconnect" disabled>Disconnect</button>
    <span id="status">Status: Not connected</span>
  </div>

  <div class="split-container">
    <div class="channel-column">
      <h3>Channel 1 Control</h3>
      <div class="btn-group">
        <button id="ch1Start" class="btn-start" disabled>Start CH1</button>
        <button id="ch1Stop" class="btn-stop" disabled>Stop CH1</button>
      </div>
      <div class="param-grid" id="grid-ch1"></div>
      <button class="btn-send-params" onclick="sendParams(1)" id="btnParams1" disabled>Send CH1 Parameters</button>
    </div>

    <div class="channel-column">
      <h3>Channel 2 Control</h3>
      <div class="btn-group">
        <button id="ch2Start" class="btn-start" disabled>Start CH2</button>
        <button id="ch2Stop" class="btn-stop" disabled>Stop CH2</button>
      </div>
      <div class="param-grid" id="grid-ch2"></div>
      <button class="btn-send-params" onclick="sendParams(2)" id="btnParams2" disabled>Send CH2 Parameters</button>
    </div>
  </div>

  <div class="row">
    <label>Incoming Data:</label>
    <div id="feedbackValue" class="value-display">---</div>
  </div>

  <div class="chart-box">
    <h3>Accelerometer (ax, ay, az) [-4000 to 4000]</h3>
    <div class="chart-container"><canvas id="imuChart"></canvas></div>
  </div>

  <div class="chart-box">
    <h3>Gyroscope (gx, gy, gz) [-4000 to 4000]</h3>
    <div class="chart-container"><canvas id="gyroChart"></canvas></div>
  </div>
</div>

<script>
  const SERVICE_UUID  = '11111111-1111-1111-1111-111111111110';
  const UUID_ACTION   = '11111111-1111-1111-1111-111111111111';
  const UUID_FEEDBACK = '11111111-1111-1111-3333-111111111111';

  let device, actionChar;
  const maxDataPoints = 60;

  const paramKeys = [
    {id: 'node', label: 'Node', def: '1'},
    {id: 'freq', label: 'Freq (Hz)', def: '50'},
    {id: 'pw', label: 'Pulse Width', def: '500'},
    {id: 'prp', label: 'PrP', def: '0'},
    {id: 'ru', label: 'Ramp Up', def: '3'},
    {id: 'h', label: 'Hold', def: '3'},
    {id: 'rd', label: 'Ramp Down', def: '3'},
    {id: 'pop', label: 'PoP', def: '0'},
    {id: 'max', label: 'Max Int', def: '1'},
    {id: 'min', label: 'Min Int', def: '0'},
    {id: 'gain', label: 'EMG Gain', def: '500'},
    {id: 'ipi', label: 'IpI', def: '100'},
    {id: 'target', label: 'Target', def: '0'},
    {id: 'tval', label: 'Target Val', def: '1'}
  ];

  [1, 2].forEach(ch => {
    const container = document.getElementById(`grid-ch${ch}`);
    paramKeys.forEach(p => {
      container.innerHTML += `
        <div class="param-item">
          <label>${p.label}</label>
          <input type="text" id="p${ch}_${p.id}" value="${p.def}">
        </div>`;
    });
  });

  Chart.defaults.devicePixelRatio = window.devicePixelRatio || 1;
  Chart.defaults.font.family = "'Segoe UI', Tahoma, sans-serif";
  Chart.defaults.font.size = 11;

  const getChartOptions = (min, max, step) => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    elements: { point: { radius: 0 }, line: { borderWidth: 2 } },
    scales: {
      x: { display: false },
      y: { 
        min: min, 
        max: max, 
        ticks: { stepSize: step, color: '#666' },
        grid: { color: 'rgba(0,0,0,0.05)' }
      }
    },
    plugins: { legend: { labels: { usePointStyle: true, boxWidth: 8 } } }
  });

  const imuChart = new Chart(document.getElementById('imuChart'), {
    type: 'line',
    data: { labels: [], datasets: [
      {label:'ax', borderColor:'#ff6384', data:[], fill: false},
      {label:'ay', borderColor:'#36a2eb', data:[], fill: false},
      {label:'az', borderColor:'#4bc0c0', data:[], fill: false}
    ]},
    options: getChartOptions(-4000, 4000, 1000)
  });

  const gyroChart = new Chart(document.getElementById('gyroChart'), {
    type: 'line',
    data: { labels: [], datasets: [
      {label:'gx', borderColor:'#ff9f40', data:[], fill: false},
      {label:'gy', borderColor:'#4bc0c0', data:[], fill: false},
      {label:'gz', borderColor:'#9966ff', data:[], fill: false}
    ]},
    options: getChartOptions(-4000, 4000, 1000)
  });

  document.getElementById('connect').addEventListener('click', async () => {
    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID]
      });

      device.addEventListener('gattserverdisconnected', onDisconnected);
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      
      actionChar = await service.getCharacteristic(UUID_ACTION);
      const feedbackChar = await service.getCharacteristic(UUID_FEEDBACK);
      
      await feedbackChar.startNotifications();
      feedbackChar.addEventListener('characteristicvaluechanged', (event) => {
        const value = new TextDecoder().decode(event.target.value);
        document.getElementById('feedbackValue').textContent = value;
        handleIncomingData(value);
      });

      setUIState(true);
      document.getElementById('status').textContent = `Connected to ${device.name}`;
      document.getElementById('status').style.color = '#28a745';

    } catch (err) {
      console.error(err);
      alert("Bluetooth connection failed.");
    }
  });

  async function sendCommand(cmd) {
    if (!actionChar) return;
    try {
      await actionChar.writeValue(new TextEncoder().encode(cmd));
    } catch (err) {
      console.error("Write error:", err);
    }
  }

  function sendParams(channelId) {
    const values = [
      document.getElementById(`p${channelId}_node`).value,
      channelId,
      document.getElementById(`p${channelId}_freq`).value,
      document.getElementById(`p${channelId}_pw`).value,
      document.getElementById(`p${channelId}_prp`).value,
      document.getElementById(`p${channelId}_ru`).value,
      document.getElementById(`p${channelId}_h`).value,
      document.getElementById(`p${channelId}_rd`).value,
      document.getElementById(`p${channelId}_pop`).value,
      document.getElementById(`p${channelId}_max`).value,
      document.getElementById(`p${channelId}_min`).value,
      document.getElementById(`p${channelId}_gain`).value,
      document.getElementById(`p${channelId}_ipi`).value,
      document.getElementById(`p${channelId}_target`).value,
      document.getElementById(`p${channelId}_tval`).value
    ];
    sendCommand("Param;" + values.join(';'));
  }

  document.getElementById('ch1Start').addEventListener('click', () => sendCommand('Com;Start;1;1'));
  document.getElementById('ch1Stop').addEventListener('click', () => sendCommand('Com;Stop;1;1'));
  document.getElementById('ch2Start').addEventListener('click', () => sendCommand('Com;Start;1;2'));
  document.getElementById('ch2Stop').addEventListener('click', () => sendCommand('Com;Stop;1;2'));

  function handleIncomingData(rawString) {
    const parts = rawString.split(';');
    if (parts.length >= 16) {
      const time = new Date().toLocaleTimeString();
      updateChart(imuChart, time, [parts[10], parts[11], parts[12]]);
      updateChart(gyroChart, time, [parts[13], parts[14], parts[15]]);
    }
  }

  function updateChart(chart, label, values) {
    chart.data.labels.push(label);
    values.forEach((v, i) => chart.data.datasets[i].data.push(parseFloat(v)));
    if (chart.data.labels.length > maxDataPoints) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();
  }

  document.getElementById('disconnect').addEventListener('click', () => {
    if (device && device.gatt.connected) device.gatt.disconnect();
  });

  function onDisconnected() {
    document.getElementById('status').textContent = "Disconnected";
    document.getElementById('status').style.color = '#dc3545';
    setUIState(false);
  }

  function setUIState(isConnected) {
    const ids = ['disconnect', 'ch1Start', 'ch1Stop', 'ch2Start', 'ch2Stop', 'btnParams1', 'btnParams2'];
    ids.forEach(id => document.getElementById(id).disabled = !isConnected);
    document.getElementById('connect').disabled = isConnected;
  }
</script>
</body>
</html>
